
#version: "3.9"  COMENTEI LENDO NA IA

services:
  app:
    build:
      context: .
    restart: always
    volumes:
      - ./app:/app  # acrescentei com a IA
      - static-data:/vol/web
    environment:
      - DJANGO_SETTINGS_MODULE=app.settings
      - PYTHONPATH=/app  # ACRESCENTEI COM A IA
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
    depends_on:
      - db

  db:
    image: postgres:13-alpine
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}

  proxy:
    build:
      context: ./proxy
    restart: always
    depends_on:
      - app
          # ... outras configurações do proxy ...
    ports:
      - "8080:8080"  # Mapeia a porta 80 do seu PC para a 8080 interna do Nginx
    environment:
      - LISTEN_PORT=8080
      - APP_HOST=app
      - APP_PORT=9000  # Alterado para 9000 para bater com o uWSGI

    volumes:
      - static-data:/vol/static

volumes:
  postgres-data:
  static-data:
